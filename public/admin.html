<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f1115" />
<meta name="robots" content="noindex,nofollow" />
<title>GoFirst</title>
<style>
  :root {
    --bg: #0f1115;
    --bg-elev: #171a21;
    --surface: #1c2029;
    --surface-2: #242834;
    --border: #2a2f3a;
    --text: #e7e9ee;
    --text-dim: #8a909c;
    --text-faint: #5a5f6a;
    --accent: #ffffff;
    --accent-hover: #d4d7dd;
    --accent-dim: rgba(255, 255, 255, 0.10);
    --accent-fg: #0f1115;
    --danger: #ef4444;
    --success: #10b981;
    --warn: #f59e0b;
    --radius: 14px;
    --radius-lg: 18px;
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --bg: #f4f6fa;
      --bg-elev: #ffffff;
      --surface: #ffffff;
      --surface-2: #f0f2f7;
      --border: #e4e7ee;
      --text: #1a1d25;
      --text-dim: #6b7280;
      --text-faint: #9ca3af;
      --accent: #1a1d25;
      --accent-hover: #000000;
      --accent-dim: rgba(26, 29, 37, 0.08);
      --accent-fg: #ffffff;
      --danger: #dc2626;
      --success: #059669;
      --warn: #d97706;
    }
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-size: 15px;
    line-height: 1.45;
  }
  a { color: inherit; }

  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 22px 80px;
  }

  /* --- Header ----------------------------------------------- */
  .head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .head h1 {
    font-size: 22px;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .head .sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .head .who {
    font-size: 13px;
    color: var(--text-dim);
    text-align: right;
  }
  .head .who b { color: var(--text); font-weight: 600; }

  /* --- Cards / sections ------------------------------------- */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.10em;
    color: var(--text-dim);
    margin: 28px 4px 10px;
  }
  .section-title:first-child { margin-top: 6px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .card + .card { margin-top: 12px; }

  /* --- Stat grid -------------------------------------------- */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    font-weight: 600;
  }
  .stat .num {
    margin-top: 6px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .stat .delta {
    font-size: 12px;
    color: var(--text-faint);
    margin-top: 2px;
  }

  /* --- Users table ------------------------------------------ */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  table {
    width: 100%;
    min-width: 760px;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  thead th {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    font-weight: 600;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--accent-dim); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  th.num { text-align: right; }
  .user-cell { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface-2);
    color: var(--text-dim);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 12px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-cell .name { font-weight: 600; }
  .user-cell .email { font-size: 12px; color: var(--text-dim); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    background: var(--surface-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .badge.coach {
    background: var(--accent-dim);
    color: var(--text);
    border-color: transparent;
  }
  .badge.role-admin { background: var(--danger); color: #fff; border-color: transparent; }
  /* Premium toggle — small clickable badge that sits inline with
     the user's name (next to the role badge). Stackable attribute,
     so it lives with identity rather than the mutually-exclusive
     role picker. Filled gold when on, outlined gray when off. */
  .premium-toggle {
    appearance: none;
    display: inline-block;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font: inherit;
    font-size: 11px;
    font-weight: 600;
    padding: 1px 8px;
    border-radius: 999px;
    cursor: pointer;
    margin-left: 6px;
    vertical-align: middle;
    line-height: 1.5;
    transition: background 0.12s, color 0.12s;
  }
  .premium-toggle:hover { background: var(--surface-2); color: var(--text); }
  .premium-toggle.on {
    background: linear-gradient(135deg, #facc15, #eab308);
    color: #1a1d25;
    border-color: transparent;
  }
  .premium-toggle.on:hover { opacity: 0.9; }
  .premium-toggle:disabled { opacity: 0.5; cursor: default; }

  /* Role picker — two-segment toggle (User / Admin) */
  .role-picker {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
    background: var(--surface-2);
  }
  .role-picker button {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--text-dim);
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    cursor: pointer;
  }
  .role-picker button + button { border-left: 1px solid var(--border); }
  .role-picker button.active {
    background: var(--accent);
    color: var(--accent-fg);
  }
  .role-picker button:disabled { opacity: 0.5; cursor: default; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 28px;
    padding: 0 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.12s ease;
  }
  .btn:hover { background: var(--accent-dim); }
  .btn.primary {
    background: var(--accent);
    color: var(--accent-fg);
    border-color: transparent;
  }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn.danger {
    color: var(--danger);
    border-color: rgba(239,68,68,0.3);
  }
  .btn:disabled { opacity: 0.5; cursor: default; }

  /* Plain "X" delete button at the end of each user row. Subtle until hover. */
  .row-delete {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--text-faint);
    font-size: 16px;
    line-height: 1;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    cursor: pointer;
    padding: 0;
  }
  .row-delete:hover { color: var(--danger); background: var(--accent-dim); }
  .row-delete:disabled { opacity: 0.4; cursor: default; }

  .filter-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin: 0 0 10px;
  }
  .filter-row input {
    flex: 1;
    height: 36px;
    padding: 0 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
  }
  .filter-row input:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* --- User detail card (shared: modal body) ---------------- */
  .client-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }
  .client-head .avatar { width: 36px; height: 36px; font-size: 14px; }
  .client-head .meta { flex: 1; min-width: 0; }
  .client-head .meta .name { font-weight: 700; font-size: 15px; }
  .client-head .meta .email { font-size: 12px; color: var(--text-dim); }
  .client-body { padding: 14px 16px; }

  .client-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 8px;
    margin-bottom: 14px;
  }
  .client-stats .stat { padding: 10px 12px; }
  .client-stats .stat .num { font-size: 18px; }

  .cat-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
    margin-bottom: 14px;
  }
  .cat-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .cat-row .label { width: 130px; color: var(--text-dim); flex-shrink: 0; }
  .cat-row .bar {
    flex: 1;
    height: 6px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
  }
  .cat-row .bar > div {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
  }
  .cat-row .pct { width: 70px; text-align: right; font-variant-numeric: tabular-nums; color: var(--text-dim); }

  .task-list { list-style: none; padding: 0; margin: 0; }
  .task-list li {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .task-list li:last-child { border-bottom: none; }
  .task-list .text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task-list .meta { color: var(--text-dim); font-size: 12px; flex-shrink: 0; }
  .task-list .recur { font-size: 11px; padding: 1px 6px; border-radius: 4px; background: var(--surface-2); color: var(--text-dim); }

  /* --- Loading / empty / error ------------------------------ */
  .center {
    text-align: center;
    color: var(--text-dim);
    padding: 28px 12px;
    font-size: 13px;
  }
  .four-oh-four {
    text-align: center;
    margin-top: 18vh;
    color: var(--text-dim);
  }
  .four-oh-four h1 {
    font-size: 64px;
    margin: 0;
    color: var(--text);
    letter-spacing: -0.04em;
  }
  .four-oh-four p { margin-top: 6px; font-size: 14px; }
  .four-oh-four a { color: var(--text-dim); text-decoration: underline; }

  /* --- User detail modal ------------------------------------ */
  /* Click any avatar in the user table to open this — full
     tasks / streaks / category breakdown / per-user analytics
     for the row, reusing the same renderClient layout. */
  .user-detail-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0, 0, 0, 0.55);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-y: auto;
  }
  .user-detail-overlay[hidden] { display: none; }
  .user-detail-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: min(720px, 100%);
    max-width: 720px;
    overflow: hidden;
    position: relative;
  }
  .user-detail-close {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    z-index: 1;
  }
  .user-detail-close:hover { color: var(--text); }
  .user-detail-loading {
    padding: 48px 16px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }
  /* The avatars in the table are now clickable — show that affordance. */
  .user-cell .avatar { cursor: pointer; transition: opacity 0.15s; }
  .user-cell .avatar:hover { opacity: 0.8; }
  .streak-list { list-style: none; padding: 0; margin: 8px 0 0; }
  .streak-list li {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-size: 13px;
  }
  .streak-list li:last-child { border-bottom: none; }
  .streak-list .meta { color: var(--text-dim); font-size: 12px; }

  /* --- Pagination ------------------------------------------- */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .pagination .controls {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .pagination button {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    cursor: pointer;
  }
  .pagination button:hover:not(:disabled) { background: var(--accent-dim); }
  .pagination button:disabled { opacity: 0.4; cursor: default; }

  /* --- Responsive ------------------------------------------- */
  @media (max-width: 720px) {
    .wrap { padding: 18px 14px 60px; }
    .head h1 { font-size: 20px; }
  }
</style>
</head>
<body>
  <div id="loading" class="center">Loading…</div>
  <div id="not-found" class="four-oh-four" hidden>
    <h1>404</h1>
    <p>This page doesn't exist.</p>
    <p><a href="/">Go home</a></p>
  </div>

  <div id="app" class="wrap" hidden>
    <div class="head">
      <div>
        <h1>GoFirst — Developer dashboard</h1>
        <div class="sub">Backend metrics and all users.</div>
      </div>
      <div class="who">
        Signed in as <b id="me-email">—</b><br/>
        <span id="server-date"></span>
      </div>
    </div>

    <div class="section-title">App-wide stats</div>
    <div id="stats" class="stats"></div>

    <div class="section-title">All users</div>
    <div class="filter-row">
      <input id="user-filter" type="search" placeholder="Search by name or email…" autocomplete="off" />
      <span id="user-count" class="badge">—</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th class="hide-sm">Joined</th>
            <th class="hide-sm">Last active</th>
            <th class="num">Tasks</th>
            <th class="num hide-sm">Streaks</th>
            <th class="num">Exec %</th>
            <th></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="8" class="center">Loading users…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="users-pagination" hidden>
      <span id="users-page-info">—</span>
      <div class="controls">
        <button type="button" id="users-prev" aria-label="Previous page">‹ Prev</button>
        <button type="button" id="users-next" aria-label="Next page">Next ›</button>
      </div>
    </div>
  </div>

  <!-- User-detail modal. Populated lazily on avatar click via
       /api/admin/users/:id; renders their tasks, streaks, and
       per-category analytics. -->
  <div id="user-detail-overlay" class="user-detail-overlay" hidden role="dialog" aria-modal="true">
    <div class="user-detail-card" id="user-detail-card">
      <button class="user-detail-close" id="user-detail-close" aria-label="Close">×</button>
      <div class="user-detail-loading" id="user-detail-body">Loading…</div>
    </div>
  </div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const fmt = {
    int: (n) => (n == null ? '—' : Number(n).toLocaleString()),
    pct: (r) => (r == null ? '—' : Math.round(r * 100) + '%'),
    date: (s) => {
      if (!s) return '—';
      const d = new Date(s);
      if (Number.isNaN(d.getTime())) return '—';
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    },
    relTime: (s) => {
      if (!s) return 'never';
      const d = new Date(s);
      if (Number.isNaN(d.getTime())) return '—';
      const diff = Date.now() - d.getTime();
      const min = Math.round(diff / 60000);
      if (min < 1) return 'just now';
      if (min < 60) return min + 'm ago';
      const hrs = Math.round(min / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.round(hrs / 24);
      if (days < 30) return days + 'd ago';
      return fmt.date(s);
    },
  };

  const escapeHtml = (s) => String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

  const initials = (name, email) => {
    const src = (name || email || '?').trim();
    const parts = src.split(/\s+/).filter(Boolean);
    if (!parts.length) return '?';
    if (parts.length === 1) return parts[0][0].toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  };

  const avatarHtml = (u) => u.picture
    ? `<span class="avatar"><img src="${escapeHtml(u.picture)}" alt=""/></span>`
    : `<span class="avatar">${escapeHtml(initials(u.name, u.email))}</span>`;

  // Auth gate: hit /api/admin/me. 404 (or anything else) => 404 page.
  // Also captures whether the caller is the app-wide admin (vs a viewer
  // who has dashboard access but not admin-only powers like Delete).
  let amAdmin = false;
  async function gate() {
    let me;
    try {
      const r = await fetch('/api/admin/me', { credentials: 'same-origin' });
      if (!r.ok) throw new Error('not admin');
      me = await r.json();
    } catch (_e) {
      $('loading').hidden = true;
      $('not-found').hidden = false;
      return null;
    }
    amAdmin = !!me.isAdmin;
    return me;
  }

  // Fetch with a hard timeout so a slow/hung server endpoint never leaves a
  // section stuck in "Loading…". Surfaces an error message in that section
  // instead, and logs the underlying cause to the console for triage.
  async function fetchJson(url, { timeoutMs = 25000 } = {}) {
    const ac = new AbortController();
    const t = setTimeout(() => ac.abort(), timeoutMs);
    try {
      const r = await fetch(url, { credentials: 'same-origin', signal: ac.signal });
      const text = await r.text();
      if (!r.ok) throw new Error(`${url} → ${r.status} ${text.slice(0, 200)}`);
      try { return JSON.parse(text); }
      catch { throw new Error(`${url} → non-JSON response: ${text.slice(0, 200)}`); }
    } finally {
      clearTimeout(t);
    }
  }

  async function loadAll() {
    const me = await gate();
    if (!me) return;
    $('me-email').textContent = me.email || '—';
    $('loading').hidden = true;
    $('app').hidden = false;

    // Each section loads independently — one slow endpoint must not block
    // the others. Sections with a failed fetch render an inline error.
    fetchJson('/api/admin/stats')
      .then(renderStats)
      .catch((err) => { console.error('[admin] stats failed', err); renderStatsError(err); });
    fetchJson('/api/admin/users')
      .then((d) => renderUsers(d.users || []))
      .catch((err) => { console.error('[admin] users failed', err); renderUsersError(err); });
  }

  function renderStatsError(err) {
    const el = $('stats');
    el.innerHTML = `<div class="stat" style="grid-column:1/-1"><div class="label">Stats failed to load</div><div class="num" style="font-size:14px;color:var(--danger)">${escapeHtml(String(err.message || err))}</div></div>`;
  }
  function renderUsersError(err) {
    $('users-body').innerHTML = `<tr><td colspan="8" class="center" style="color:var(--danger)">Could not load users: ${escapeHtml(String(err.message || err))}</td></tr>`;
  }

  function renderStats(s) {
    const el = $('stats');
    if (s.serverDate) $('server-date').textContent = 'Server date: ' + s.serverDate;
    const total = s.users && s.users.total;
    const cards = [
      { label: 'Total users', num: fmt.int(total), delta: '' },
      { label: 'Active users', num: fmt.int(s.users && s.users.active30d), delta: 'created a task in last 30d' },
      { label: 'Paid users', num: fmt.int(s.users && s.users.paid), delta: 'on coaching subscription' },
      { label: 'App-wide execution', num: fmt.pct(s.appExecutionRate), delta: 'avg of per-user rates' },
    ];
    el.innerHTML = cards.map(c => `
      <div class="stat">
        <div class="label">${escapeHtml(c.label)}</div>
        <div class="num">${c.num}</div>
        ${c.delta ? `<div class="delta">${escapeHtml(c.delta)}</div>` : ''}
      </div>
    `).join('');
  }

  // --- Users table -----------------------------------------------------
  let allUsers = [];
  const USERS_PER_PAGE = 25;
  let usersPage = 1;

  function renderUsers(users) {
    allUsers = users;
    $('user-count').textContent = users.length + ' users';
    usersPage = 1;
    applyUserFilter();
  }

  function applyUserFilter() {
    const q = ($('user-filter').value || '').trim().toLowerCase();
    const rows = q
      ? allUsers.filter(u =>
          (u.email || '').toLowerCase().includes(q) ||
          (u.name || '').toLowerCase().includes(q))
      : allUsers;

    const body = $('users-body');
    const pager = $('users-pagination');
    if (!rows.length) {
      body.innerHTML = `<tr><td colspan="8" class="center">No users match.</td></tr>`;
      pager.hidden = true;
      return;
    }

    const totalPages = Math.max(1, Math.ceil(rows.length / USERS_PER_PAGE));
    if (usersPage > totalPages) usersPage = totalPages;
    if (usersPage < 1) usersPage = 1;
    const start = (usersPage - 1) * USERS_PER_PAGE;
    const pageRows = rows.slice(start, start + USERS_PER_PAGE);

    pager.hidden = rows.length <= USERS_PER_PAGE;
    $('users-page-info').textContent =
      `Showing ${start + 1}–${start + pageRows.length} of ${rows.length}` +
      (totalPages > 1 ? ` · page ${usersPage}/${totalPages}` : '');
    $('users-prev').disabled = usersPage <= 1;
    $('users-next').disabled = usersPage >= totalPages;

    body.innerHTML = pageRows.map(u => {
      const role = u.isAdmin ? 'admin' : 'user';
      const roleBadge = role === 'admin'
        ? '<span class="badge role-admin">Admin</span>'
        : '';
      const premiumPill = `<button class="premium-toggle ${u.isPremium ? 'on' : ''}"
                  data-premium-toggle data-id="${escapeHtml(u.id)}"
                  title="${u.isPremium ? 'Remove Premium' : 'Grant Premium'}">${u.isPremium ? '★ Premium' : '☆ Premium'}</button>`;
      // Only the actual admin can promote/demote the admin role; other
      // viewers see the segment but it's disabled. The X delete button is
      // also admin-only.
      const adminBtnAttrs = amAdmin ? '' : 'disabled title="Only the admin can grant the admin role"';
      const deleteCell = amAdmin
        ? `<td><button class="row-delete" data-delete data-id="${escapeHtml(u.id)}" data-email="${escapeHtml(u.email || '')}" title="Delete user" aria-label="Delete user">×</button></td>`
        : `<td></td>`;
      return `
      <tr data-id="${escapeHtml(u.id)}">
        <td>
          <div class="user-cell">
            <span data-user-detail="${escapeHtml(u.id)}" role="button" tabindex="0" aria-label="Open ${escapeHtml(u.name || u.email || 'user')} details">${avatarHtml(u)}</span>
            <div>
              <div class="name">${escapeHtml(u.name || '—')} ${roleBadge} ${premiumPill}</div>
              <div class="email">${escapeHtml(u.email || '')}</div>
            </div>
          </div>
        </td>
        <td class="hide-sm">${fmt.date(u.createdAt)}</td>
        <td class="hide-sm">${escapeHtml(fmt.relTime(u.lastActivityAt))}</td>
        <td class="num">${fmt.int(u.taskCount)}</td>
        <td class="num hide-sm">${fmt.int(u.streakCount)}</td>
        <td class="num">${fmt.pct(u.executionRate)}</td>
        <td>
          <div class="role-picker" data-role-picker data-id="${escapeHtml(u.id)}">
            <button data-role="user"  class="${role === 'user'  ? 'active' : ''}">User</button>
            <button data-role="admin" class="${role === 'admin' ? 'active' : ''}" ${adminBtnAttrs}>Admin</button>
          </div>
        </td>
        ${deleteCell}
      </tr>`;
    }).join('');
  }

  $('user-filter').addEventListener('input', () => {
    usersPage = 1;
    applyUserFilter();
  });

  $('users-prev').addEventListener('click', () => {
    if (usersPage > 1) { usersPage--; applyUserFilter(); }
  });
  $('users-next').addEventListener('click', () => {
    usersPage++;
    applyUserFilter();
  });

  // Click handler for the role picker. Disable the segment while the
  // request runs, then refresh the users table.
  $('users-body').addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-role-picker] button');
    if (!btn) return;
    const picker = btn.closest('[data-role-picker]');
    const id = picker.dataset.id;
    const role = btn.dataset.role; // 'user' | 'admin'
    if (btn.classList.contains('active')) return; // no-op
    if (btn.disabled) return; // admin segment is disabled for non-admin viewers
    [...picker.querySelectorAll('button')].forEach(b => b.disabled = true);
    try {
      const r = await fetch(`/api/admin/users/${encodeURIComponent(id)}/role`, {
        method: 'PATCH',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ role }),
      });
      if (!r.ok) throw new Error('bad status ' + r.status);
      const u = allUsers.find(x => x.id === id);
      if (u) u.isAdmin = role === 'admin';
      // Single-admin invariant — demote any other in-memory holder.
      if (role === 'admin') {
        for (const x of allUsers) if (x.id !== id) x.isAdmin = false;
      }
      applyUserFilter();
    } catch (err) {
      [...picker.querySelectorAll('button')].forEach(b => b.disabled = false);
      alert('Could not update role. ' + err.message);
    }
  });

  // Premium toggle — stackable attribute, orthogonal to role.
  $('users-body').addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-premium-toggle]');
    if (!btn) return;
    const id = btn.dataset.id;
    const u = allUsers.find(x => x.id === id);
    if (!u) return;
    const next = !u.isPremium;
    btn.disabled = true;
    try {
      const r = await fetch(`/api/admin/users/${encodeURIComponent(id)}/premium`, {
        method: 'PATCH',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ isPremium: next }),
      });
      if (!r.ok) throw new Error('bad status ' + r.status);
      u.isPremium = next;
      applyUserFilter();
    } catch (err) {
      btn.disabled = false;
      alert('Could not update Premium. ' + err.message);
    }
  });

  // Hard-delete a user. Cascades through their tasks, streaks, messages,
  // friendships per the schema. Confirm via a typed-email dialog so the
  // wrong row can't be wiped with a stray click.
  $('users-body').addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-delete]');
    if (!btn) return;
    const id = btn.dataset.id;
    const email = btn.dataset.email || '(no email)';
    const typed = prompt(
      `Permanently delete this user?\n\n${email}\n\n` +
      `This cannot be undone. All of their tasks, streaks, messages, and ` +
      `friend connections will be removed.\n\n` +
      `Type the email to confirm:`
    );
    if (typed == null) return;
    if (typed.trim().toLowerCase() !== email.trim().toLowerCase()) {
      alert('Email did not match. User was not deleted.');
      return;
    }
    btn.disabled = true;
    try {
      const r = await fetch(`/api/admin/users/${encodeURIComponent(id)}`, {
        method: 'DELETE',
        credentials: 'same-origin',
      });
      if (!r.ok) {
        const body = await r.text().catch(() => '');
        throw new Error(`status ${r.status} ${body.slice(0, 200)}`);
      }
      allUsers = allUsers.filter(x => x.id !== id);
      applyUserFilter();
    } catch (err) {
      btn.disabled = false;
      alert('Could not delete user. ' + err.message);
    }
  });

  // --- User detail modal ----------------------------------------------
  // Click any avatar in the user table → fetch /api/admin/users/:id and
  // render a card with their tasks, streaks, and analytics. Same layout
  // as the coaching-client cards but adds a streaks list and skips the
  // "Unmark" button (since the user might not be a coaching client).
  $('users-body').addEventListener('click', (e) => {
    const trigger = e.target.closest('[data-user-detail]');
    if (!trigger) return;
    openUserDetail(trigger.dataset.userDetail);
  });
  $('users-body').addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const trigger = e.target.closest('[data-user-detail]');
    if (!trigger) return;
    e.preventDefault();
    openUserDetail(trigger.dataset.userDetail);
  });

  $('user-detail-close').addEventListener('click', closeUserDetail);
  $('user-detail-overlay').addEventListener('click', (e) => {
    // Click outside the card (on the backdrop) closes the modal.
    if (e.target === $('user-detail-overlay')) closeUserDetail();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !$('user-detail-overlay').hidden) closeUserDetail();
  });

  function closeUserDetail() {
    $('user-detail-overlay').hidden = true;
    $('user-detail-body').innerHTML = '<div class="user-detail-loading">Loading…</div>';
  }

  async function openUserDetail(userId) {
    const overlay = $('user-detail-overlay');
    const body    = $('user-detail-body');
    overlay.hidden = false;
    body.innerHTML = '<div class="user-detail-loading">Loading…</div>';
    try {
      const data = await fetchJson(`/api/admin/users/${encodeURIComponent(userId)}`);
      body.innerHTML = renderUserDetail(data);
    } catch (err) {
      console.error('[admin] user-detail failed', err);
      body.innerHTML = `<div class="user-detail-loading">Couldn't load user details.<br/><small>${escapeHtml(err.message || 'unknown')}</small></div>`;
    }
  }

  function renderUserDetail(d) {
    const u = d.user;
    const s = d.summary || {};
    const cats = s.byCategory || {};
    const catKeys = Object.keys(cats).sort();
    const maxScheduled = Math.max(1, ...catKeys.map(k => cats[k].scheduled || 0));

    const catRows = catKeys.length
      ? catKeys.map(k => {
          const v = cats[k];
          const pct = v.scheduled > 0 ? (v.completed / v.scheduled) : null;
          const w = v.scheduled / maxScheduled * 100;
          return `
            <div class="cat-row">
              <div class="label">${escapeHtml(k)}</div>
              <div class="bar"><div style="width:${w.toFixed(1)}%"></div></div>
              <div class="pct">${v.completed}/${v.scheduled} · ${fmt.pct(pct)}</div>
            </div>`;
        }).join('')
      : '<div class="center" style="padding:8px 0">No categorized tasks yet.</div>';

    // Up to 25 most-recently-updated tasks. Beyond that the modal gets
    // unwieldy and the analytics rollup above tells the broader story.
    const tasks = (d.tasks || []).slice(0, 25);
    const taskHtml = tasks.length
      ? tasks.map(t => {
          const recurLabel = t.recurrence
            ? (t.recurrence.type || 'recurring')
            : (t.done ? 'done' : 'open');
          const meta = t.recurrence
            ? `${(t.completedDates || []).length} done`
            : (t.scheduledDate || fmt.date(t.createdAt));
          return `
            <li>
              <span class="recur">${escapeHtml(recurLabel)}</span>
              <span class="text">${escapeHtml(t.text)}</span>
              <span class="meta">${escapeHtml(meta)}</span>
            </li>`;
        }).join('')
      : '<li><span class="text" style="color:var(--text-dim)">No tasks yet.</span></li>';

    const streaks = d.streaks || [];
    const streakHtml = streaks.length
      ? streaks.map(st => {
          // Days since startAt (which is "YYYY-MM-DDTHH:MM" local string).
          const start = new Date(st.startAt);
          const days = Math.max(0, Math.floor((Date.now() - start.getTime()) / 86_400_000));
          return `
            <li>
              <span>${escapeHtml(st.name)}</span>
              <span class="meta">${days} day${days === 1 ? '' : 's'} · since ${fmt.date(st.startAt)}</span>
            </li>`;
        }).join('')
      : '<li><span class="meta" style="color:var(--text-dim)">No quit streaks.</span></li>';

    const tzLabel = u.timezone || 'no tz';
    return `
      <div class="client-head">
        ${avatarHtml(u)}
        <div class="meta">
          <div class="name">${escapeHtml(u.name || u.email)}</div>
          <div class="email">${escapeHtml(u.email)} · joined ${fmt.date(u.createdAt)} · ${escapeHtml(tzLabel)}</div>
        </div>
      </div>
      <div class="client-body">
        <div class="client-stats">
          <div class="stat"><div class="label">Tasks</div><div class="num">${fmt.int(s.totalTasks)}</div></div>
          <div class="stat"><div class="label">Recurring</div><div class="num">${fmt.int(s.recurringCount)}</div></div>
          <div class="stat"><div class="label">One-shots</div><div class="num">${fmt.int(s.oneShotCount)}</div></div>
          <div class="stat"><div class="label">Exec rate</div><div class="num">${fmt.pct(s.executionRate)}</div></div>
          <div class="stat"><div class="label">Streaks</div><div class="num">${fmt.int(streaks.length)}</div></div>
        </div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);font-weight:600;margin:14px 0 6px">By category</div>
        <div class="cat-grid">${catRows}</div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);font-weight:600;margin:14px 0 6px">Recent tasks</div>
        <ul class="task-list">${taskHtml}</ul>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);font-weight:600;margin:14px 0 0">Quit streaks</div>
        <ul class="streak-list">${streakHtml}</ul>
      </div>
    `;
  }

  loadAll();
})();
</script>
</body>
</html>
